on:
  pull_request:
    types: [opened, synchronize, labeled]

jobs:
  deploy:
    if: contains(github.event.pull_request.labels.*.name, 'docs-update')
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Build site
        run: docker run --rm -v $(pwd):/site ghcr.io/ravindk89/braised:latest build --config braised-staging.yaml

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Deploy
        run: |
          rsync --mkpath -rv --delete -e "ssh -p ${{ secrets.DEPLOY_PORT }} -o StrictHostKeyChecking=no" \
            ./dist/ \
            deploy-staging@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/${{ github.head_ref }}/

      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Staged at https://staging.ravindkumar.com/postgres-docs/${{ github.head_ref }}/`
            })
